# Render Blueprint: Django API lives in /backend (monorepo).
# Dashboard: https://dashboard.render.com → apply blueprint or set Root Directory to backend.

services:
  - type: web
    name: smartfix-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn smartfix.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "0"
      # Set in dashboard to your *.onrender.com hostname (comma-separated, no spaces):
      - key: ALLOWED_HOSTS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_BASE_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
