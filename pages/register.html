<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create account | Smart Fix & Recycle Uganda</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/auth-pages.css"/>
</head>
<body class="auth-shell">

<div id="siteNav"></div>

<main class="flex min-h-[calc(100vh-5rem)] items-center justify-center px-4 pb-12 pt-20">
  <div class="w-full max-w-[340px]">
    <div class="rounded-xl border border-slate-200 bg-white p-5 shadow-md shadow-slate-900/5">
      <h1 class="text-center text-base font-bold text-slate-900">Create account</h1>
      <p class="mt-1 text-center text-xs text-slate-500">Quick registration — then verify your email.</p>

      <button type="button" id="openSignupModal" class="mt-4 w-full rounded-lg bg-orange-500 py-2.5 text-sm font-bold text-slate-900 transition hover:bg-orange-400">
        Register
      </button>

      <p class="mt-4 border-t border-slate-100 pt-3 text-center text-xs text-slate-600">
        Have an account?
        <button type="button" id="openLoginModal" class="font-semibold text-slate-900 hover:text-orange-600">Sign in</button>
      </p>
    </div>
  </div>
</main>

<footer class="pb-6 text-center text-[11px] text-slate-400">&copy; 2026 Smart Fix & Recycle Uganda</footer>

<script src="../js/auth.js"></script>
<script>
  SFRAuth.mountSiteNavbar({ targetId: "siteNav", active: "" });
  document.getElementById("openSignupModal")?.addEventListener("click", () => SFRAuth.openAuthModal("signup"));
  document.getElementById("openLoginModal")?.addEventListener("click", () => SFRAuth.openAuthModal("login"));
</script>
</body>
</html>
